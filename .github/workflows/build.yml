name: Build Wine

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  CC: clang
  CXX: clang++
  CPATH: /usr/local/include
  LIBRARY_PATH: /usr/local/lib
  CFLAGS: -O3
  CROSSCFLAGS: -O3 -Wno-error=incompatible-pointer-types -Wno-error=int-conversion
  LDFLAGS: -Wl,-headerpad_max_install_names -Wl,-rpath,@loader_path/../../ -Wl,-rpath,/usr/local/lib
  MACOSX_DEPLOYMENT_TARGET: 14.0
  WINE_CONFIGURE: $GITHUB_WORKSPACE/configure
  BUILDROOT: $GITHUB_WORKSPACE/build
  WINE_INSTALLROOT: install
  WINE_MONO: https://github.com/madewokherd/wine-mono/releases/download/wine-mono-10.4.1/wine-mono-10.4.1-x86.tar.xz

jobs:
  build:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew Packages
        continue-on-error: true
        run: |
          REQUIRED_PACKAGES=(
              # Build Dependencies
              "bison"
              "pkg-config"
              "mingw-w64"
              "lld"

              # Dependencies
              "freetype"
              "gettext"
              "gnutls"
              "gstreamer"
              "sdl2"
              "molten-vk"
              "winetricks"
          )

          brew update
          brew install "${REQUIRED_PACKAGES[@]}"

      - name: Add bison to $PATH
        run: |
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Echo Libs [DEBUG]
        run: |
          echo "Brew Libs"
          ls $(brew --prefix)/lib

          echo "GStreamer Libs"
          ls $(brew --prefix gstreamer)/lib/gstreamer-1.0

      - name: Configure Wine
        run: |
          set -x

          export ac_cv_lib_soname_MoltenVK="libMoltenVK.dylib"
          export ac_cv_lib_soname_vulkan=""

          mkdir -p ${{ env.BUILDROOT }}/wine
          pushd ${{ env.BUILDROOT }}/wine
          ${{ env.WINE_CONFIGURE }} \
            --prefix= \
            --disable-tests \
            --disable-winedbg \
            --enable-archs=i386,x86_64 \
            --with-coreaudio \
            --with-cups \
            --with-freetype \
            --with-gettext \
            --with-gnutls \
            --with-gstreamer \
            --with-mingw \
            --with-opencl \
            --with-pcap \
            --with-pthread \
            --with-sdl \
            --with-unwind \
            --with-vulkan \
            --without-alsa \
            --without-capi \
            --without-dbus \
            --without-fontconfig \
            --without-gettextpo \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pulse \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-x
          popd

      - name: Build Wine
        run: |
          pushd ${{ env.BUILDROOT }}/wine
          make -j$(sysctl -n hw.ncpu 2>/dev/null)
          popd

      - name: Install Wine
        run: |
          pushd ${{ env.BUILDROOT }}/wine
          make install-lib DESTDIR="$GITHUB_WORKSPACE/${{ env.WINE_INSTALLROOT }}"
          popd

      - name: Grab Verbs From Winetricks
        run: |
          curl -L -o verbs.txt https://raw.githubusercontent.com/Winetricks/winetricks/master/files/verbs/all.txt

      - name: Create Final Package
        run: |
          mkdir -p Libraries/DXVK
          mkdir -p Libraries/Wine

          cp -a ${{ env.WINE_INSTALLROOT }}/. Libraries/Wine/

          ln -s wine Libraries/Wine/bin/wine64

          rm -rf Libraries/Wine/share/man

          cp -a $(brew --prefix winetricks)/bin/winetricks Libraries
          cp -a verbs.txt Libraries
          cp -a DXVK Libraries

      - name: Copy External Libs
        run: |
          chmod +x .github/dylib_packer.zsh
          .github/dylib_packer.zsh

      - name: Install GPTK
        run: |
          ditto GPTK/redist/lib/ Libraries/Wine/lib/

      - name: Copy Version .plist
        run: |
          cp -a WhiskyWineVersion.plist Libraries/

      - name: Install WineMono
        run: |
          mkdir Libraries/Wine/share/wine/mono

          curl -L -o mono.tar.xz ${{ env.WINE_MONO }}
          tar -xzf mono.tar.xz -C Libraries/Wine/share/wine/mono

      - name: Build Checksum
        run: |
          find ./Libraries -type f -exec shasum "{}" + > SUMS.sha

      - name: Upload config.log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: config
          path: build/wine/config.log

      - name: Tar Libraries
        if: success()
        run: |
          tar -zcf Libraries.tar.gz Libraries

      - name: Upload Libraries
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: Libraries
          path: Libraries.tar.gz
          archive: false

      - name: Upload SUMS
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: SUMS
          path: SUMS.sha
